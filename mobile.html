<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AxisFleet — Field Ops</title>
<link rel="icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0D1B2A;--blue:#1E90FF;
  --red:#EF4444;--amber:#F59E0B;--green:#22C55E;
  --sub:#94A3B8;--bg:#F4F7FB;--white:#FFFFFF;--border:#E2E8F0;
  --dark1:#0A1520;--dark2:#111E2C;--dark3:#1A2B3C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);overflow:hidden;color:var(--navy);}
.shell{display:flex;flex-direction:column;height:100%;}

/* TOP BAR */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{height:22px;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.04em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-time{font-size:0.7rem;color:var(--sub);font-weight:600;}
.topbar-back{background:none;border:1px solid var(--border);color:var(--sub);font-size:0.7rem;font-weight:700;font-family:'Barlow',sans-serif;padding:5px 10px;cursor:pointer;text-decoration:none;}

/* NAV BADGE */
.nav-badge{min-width:16px;height:16px;background:var(--red);color:white;font-size:0.58rem;font-weight:800;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;position:absolute;top:4px;right:10px;}

/* TAB PANES */
.tab-pane{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tab-pane.active{display:block;}
.tab-pane::-webkit-scrollbar{display:none;}
.pane-inner{padding:14px 14px 28px;}

/* BOTTOM NAV */
.bottomnav{height:58px;background:var(--white);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--sub);transition:color 0.12s;position:relative;min-height:48px;}
.nav-btn.active{color:var(--navy);}
.nav-btn svg{width:21px;height:21px;}
.nav-label{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;font-family:'Barlow',sans-serif;}

/* SECTION HDR */
.section-hdr{font-size:0.64rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between;}
.hdr-pill{font-size:0.6rem;font-weight:700;color:var(--sub);background:var(--border);padding:1px 8px;border-radius:10px;}
.hdr-pill.red{background:#FEE2E2;color:var(--red);}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--white);border:1px solid var(--border);padding:13px 10px;text-align:center;}
.stat-card.span2{grid-column:span 2;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:800;line-height:1;color:var(--navy);}
.stat-num.is-alert{color:var(--red);}
.stat-lbl{font-size:0.6rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}

/* HEALTH BAR */
.health-card{background:var(--white);border:1px solid var(--border);padding:12px 14px;margin-bottom:14px;}
.health-title{font-size:0.64rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.health-bar-row{display:flex;gap:2px;height:7px;overflow:hidden;margin-bottom:7px;}
.health-seg{height:100%;}
.health-legend{display:flex;gap:12px;flex-wrap:wrap;}
.h-leg{display:flex;align-items:center;gap:4px;font-size:0.64rem;color:var(--sub);}
.h-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* OPS LOG */
.ops-log-wrap{background:var(--white);border:1px solid var(--border);}
.ops-log-row{display:flex;padding:7px 12px;border-bottom:1px solid var(--border);align-items:flex-start;gap:6px;}
.ops-log-row:last-child{border-bottom:none;}
.ops-log-ts{font-family:'Courier New',monospace;font-size:0.68rem;color:var(--navy);flex-shrink:0;white-space:nowrap;}
.ops-log-dash{font-size:0.68rem;color:var(--sub);flex-shrink:0;}
.ops-log-txt{font-size:0.72rem;color:var(--sub);line-height:1.45;}

/* FLEET */
.search-bar{width:100%;background:var(--white);border:1px solid var(--border);padding:10px 12px;font-size:0.88rem;font-family:'Barlow',sans-serif;color:var(--navy);outline:none;margin-bottom:10px;}
.search-bar:focus{border-color:var(--navy);}
.fleet-card{background:var(--white);border:1px solid var(--border);margin-bottom:8px;border-left:3px solid transparent;}
.fleet-card.has-flag{border-left-color:var(--red);}
.fleet-card.has-warn{border-left-color:var(--amber);}
.fleet-row{display:flex;align-items:center;gap:10px;padding:12px 12px;min-height:52px;}
.fc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.fc-dot.green{background:var(--green);}
.fc-dot.red{background:var(--red);animation:blink 1s infinite;}
.fc-dot.amber{background:var(--amber);animation:blink 1.5s infinite;}
.fc-dot.muted{background:#CBD5E1;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.35;}}
.fc-tap-id{font-size:0.9rem;font-weight:800;color:var(--navy);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border);text-underline-offset:2px;}
.fc-tap-id:hover{color:var(--blue);}
.fc-driver{font-size:0.7rem;color:var(--sub);margin-top:1px;}
.fc-route{font-size:0.65rem;color:var(--sub);}
.fc-weight{font-size:0.8rem;font-weight:700;color:var(--navy);}
.fc-speed{font-size:0.65rem;color:var(--sub);margin-top:2px;}
.fc-chev{font-size:0.78rem;color:var(--sub);margin-left:4px;transition:transform 0.2s;flex-shrink:0;cursor:pointer;}
.fc-chev.open{transform:rotate(180deg);}

/* RAW PANEL */
.raw-panel{display:none;background:var(--dark1);border-top:1px solid rgba(255,255,255,0.05);}
.raw-panel.open{display:block;}
.raw-panel-hdr{background:var(--dark2);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);}
.raw-hdr-title{font-size:0.67rem;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;font-family:'Barlow',sans-serif;}
.raw-live{display:flex;align-items:center;gap:4px;font-size:0.6rem;font-weight:700;color:var(--green);}
.raw-live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;}
.raw-section-title{background:var(--dark3);padding:5px 12px;font-size:0.6rem;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.1em;font-family:'Barlow',sans-serif;}
.raw-row{display:flex;justify-content:space-between;padding:4px 12px;}
.raw-k{font-family:'Courier New',monospace;font-size:0.68rem;color:rgba(255,255,255,0.3);}
.raw-v{font-family:'Courier New',monospace;font-size:0.68rem;font-weight:600;color:rgba(255,255,255,0.75);}
.raw-v.ok{color:var(--green);}
.raw-v.bad{color:var(--red);}
.raw-v.flag{color:var(--amber);}

/* DETAIL PANEL */
.det-panel{display:none;border-top:1px solid var(--border);}
.det-panel.open{display:block;}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:12px 12px 8px;}
.det-item{padding:3px 0;}
.det-lbl{font-size:0.6rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.07em;}
.det-val{font-size:0.83rem;font-weight:700;color:var(--navy);margin-top:2px;}
.det-val.over{color:var(--red);}
.det-flags{padding:0 12px;margin-bottom:8px;}
.det-flag-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--red);margin-bottom:4px;}
.det-flag-row.warn{border-left-color:var(--amber);}
.det-flag-txt{font-size:0.75rem;font-weight:700;color:var(--navy);}
.det-flag-btns{display:flex;gap:5px;}
.det-flag-btn{font-size:0.62rem;font-weight:700;font-family:'Barlow',sans-serif;padding:4px 9px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--navy);min-height:28px;}
.det-action-row{display:flex;gap:6px;padding:0 12px 10px;}
.det-btn{flex:1;padding:9px;font-size:0.7rem;font-weight:700;font-family:'Barlow',sans-serif;border:1px solid var(--border);background:var(--white);color:var(--navy);cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;min-height:40px;display:flex;align-items:center;justify-content:center;gap:4px;text-decoration:none;}
.note-area{padding:0 12px 6px;}
.note-lbl{font-size:0.6rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.note-ta{width:100%;background:var(--white);border:1px solid var(--border);padding:8px 10px;font-size:0.82rem;font-family:'Barlow',sans-serif;color:var(--navy);resize:none;min-height:48px;outline:none;}
.note-ta:focus{border-color:var(--navy);}
.note-save-btn{background:var(--navy);color:white;border:none;padding:6px 12px;font-size:0.65rem;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;margin-top:5px;min-height:30px;}
.note-save-btn.saved{background:var(--green);}
.act-log-area{padding:0 12px 12px;}
.act-log-title{font-size:0.6rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.act-log-row{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.act-log-row:last-child{border-bottom:none;}
.act-log-ts{font-family:'Courier New',monospace;font-size:0.67rem;color:var(--navy);flex-shrink:0;}
.act-log-dash{font-size:0.67rem;color:var(--sub);flex-shrink:0;}
.act-log-txt{font-size:0.7rem;color:var(--sub);line-height:1.4;}

/* ALERTS — CATEGORY SCREEN */
.alerts-cat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.new-flag-btn{font-size:0.72rem;font-weight:700;color:var(--navy);background:var(--white);border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:0.04em;min-height:32px;}
.cat-card{background:var(--white);border:1px solid var(--border);display:flex;align-items:center;margin-bottom:8px;cursor:pointer;overflow:hidden;}
.cat-card:hover{background:var(--bg);}
.cat-accent{width:4px;align-self:stretch;flex-shrink:0;}
.cat-body{flex:1;padding:12px 12px;}
.cat-name{font-size:0.88rem;font-weight:800;color:var(--navy);}
.cat-desc{font-size:0.7rem;color:var(--sub);margin-top:2px;}
.cat-right{padding:0 14px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.cat-count{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--navy);line-height:1;}
.cat-count.live{color:var(--red);}
.cat-count-lbl{font-size:0.56rem;color:var(--sub);text-transform:uppercase;letter-spacing:0.06em;}
.cat-arrow{font-size:0.78rem;color:var(--sub);padding-right:12px;flex-shrink:0;}

/* ALERTS — LIST SCREEN */
.screen{display:block;}
.screen.hidden{display:none;}
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.list-back{font-size:0.72rem;font-weight:700;color:var(--sub);background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;padding:0;}
.list-title{font-size:0.82rem;font-weight:800;color:var(--navy);}
.list-count{font-size:0.7rem;color:var(--sub);}

/* ALERT CARD */
.alert-card{background:var(--white);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.alert-card-top{background:var(--dark1);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.act-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;margin-right:8px;}
.act-truck{font-size:0.88rem;font-weight:800;color:white;}
.act-driver{font-size:0.67rem;color:rgba(255,255,255,0.4);margin-top:1px;}
.act-badge{font-size:0.6rem;font-weight:700;padding:3px 8px;text-transform:uppercase;letter-spacing:0.04em;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);flex-shrink:0;}
.act-badge.b-alert{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.3);color:#FCA5A5;}
.act-badge.b-warn{background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.25);color:#FCD34D;}
.act-badge.b-esc{color:rgba(255,255,255,0.45);}
.act-badge.b-cleared{color:rgba(255,255,255,0.25);}
.alert-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.a-stat{padding:9px 8px;text-align:center;border-right:1px solid var(--border);}
.a-stat:last-child{border-right:none;}
.a-stat-val{font-size:0.86rem;font-weight:800;color:var(--navy);}
.a-stat-val.over{color:var(--red);}
.a-stat-lbl{font-size:0.56rem;color:var(--sub);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.alert-log-toggle{width:100%;padding:7px 12px;font-size:0.64rem;font-weight:700;font-family:'Barlow',sans-serif;background:var(--bg);border:none;border-bottom:1px solid var(--border);color:var(--sub);cursor:pointer;text-align:left;text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;justify-content:space-between;}
.alert-log-body{display:none;padding:8px 12px;border-bottom:1px solid var(--border);}
.alert-log-body.open{display:block;}
.al-row{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.al-row:last-child{border-bottom:none;}
.al-ts{font-family:'Courier New',monospace;font-size:0.67rem;color:var(--navy);flex-shrink:0;}
.al-dash{font-size:0.67rem;color:var(--sub);flex-shrink:0;}
.al-txt{font-size:0.7rem;color:var(--sub);line-height:1.4;}
.alert-actions{display:flex;}
.alert-action{flex:1;padding:10px 4px;font-size:0.65rem;font-weight:700;font-family:'Barlow',sans-serif;border:none;background:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;color:var(--sub);border-right:1px solid var(--border);min-height:42px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;}
.alert-action:last-child{border-right:none;}
.alert-action:hover{background:var(--bg);}
.alert-action-icon{font-size:0.85rem;}
.cleared-note{padding:7px 12px;font-size:0.68rem;color:var(--sub);border-top:1px solid var(--border);}

.all-clear{text-align:center;padding:40px 20px;}
.all-clear-icon{font-size:2.6rem;margin-bottom:10px;}
.all-clear-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.04em;}
.all-clear-sub{font-size:0.78rem;color:var(--sub);margin-top:5px;}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--white);border-top:1px solid var(--border);width:100%;max-width:480px;padding:20px 20px 32px;}
.modal-handle{width:32px;height:3px;background:var(--border);margin:0 auto 16px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
.modal-sub{font-size:0.75rem;color:var(--sub);margin-bottom:14px;line-height:1.5;}
.modal-select{width:100%;background:var(--bg);border:1px solid var(--border);padding:10px 12px;font-size:0.88rem;font-family:'Barlow',sans-serif;color:var(--navy);outline:none;margin-bottom:10px;}
.modal-select:focus{border-color:var(--navy);}
.sms-preview{background:var(--dark1);padding:12px;margin-bottom:14px;font-size:0.72rem;font-family:'Courier New',monospace;color:rgba(255,255,255,0.65);line-height:1.8;white-space:pre-wrap;}
.sms-to{font-size:0.72rem;color:var(--sub);margin-bottom:10px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);}
.sms-to strong{color:var(--navy);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-cancel{flex:1;padding:12px;background:var(--bg);border:1px solid var(--border);font-size:0.8rem;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;color:var(--sub);}
.modal-confirm{flex:2;padding:12px;background:var(--navy);border:none;font-size:0.8rem;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;color:white;text-transform:uppercase;letter-spacing:0.04em;}
</style>
</head>
<body>
<div class="shell">

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="logo_mark.svg" class="topbar-logo" alt="AxisFleet"/>
    <span class="topbar-title">Field Ops</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-time" id="mob-clock">--:--</span>
    <a href="hub.html" class="topbar-back">← Desktop</a>
  </div>
</div>

<!-- OVERVIEW TAB -->
<div class="tab-pane active" id="pane-overview">
  <div class="pane-inner">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="ov-active">—</div><div class="stat-lbl">Active</div></div>
      <div class="stat-card"><div class="stat-num is-alert" id="ov-alerts">—</div><div class="stat-lbl">Alerts</div></div>
      <div class="stat-card"><div class="stat-num" id="ov-loaded">—</div><div class="stat-lbl">On Load</div></div>
      <div class="stat-card span2">
        <div style="display:flex;justify-content:space-between;">
          <div><div class="stat-num" id="ov-loads" style="font-size:1.6rem;">18</div><div class="stat-lbl">Loads Today</div></div>
          <div style="text-align:right;"><div class="stat-num" id="ov-idle" style="font-size:1.6rem;">—</div><div class="stat-lbl">Idle</div></div>
        </div>
      </div>
      <div class="stat-card"><div class="stat-num" id="ov-overloads">3</div><div class="stat-lbl">Overloads</div></div>
    </div>
    <div class="health-card">
      <div class="health-title">Fleet Health</div>
      <div class="health-bar-row" id="health-bar"></div>
      <div class="health-legend">
        <div class="h-leg"><div class="h-dot" style="background:var(--green)"></div>On load</div>
        <div class="h-leg"><div class="h-dot" style="background:var(--amber)"></div>Warning</div>
        <div class="h-leg"><div class="h-dot" style="background:var(--red)"></div>Alert</div>
        <div class="h-leg"><div class="h-dot" style="background:#CBD5E1"></div>Idle</div>
      </div>
    </div>
    <div class="section-hdr">Operations Log <span class="hdr-pill" id="log-count">5 entries</span></div>
    <div class="ops-log-wrap" id="ops-log"></div>
  </div>
</div>

<!-- FLEET TAB -->
<div class="tab-pane" id="pane-fleet">
  <div class="pane-inner">
    <input type="search" class="search-bar" id="fleet-search" placeholder="Search truck or driver..." oninput="renderFleet()"/>
    <div id="fleet-list"></div>
  </div>
</div>

<!-- ALERTS TAB -->
<div class="tab-pane" id="pane-alerts">
  <div class="pane-inner">
    <div class="screen" id="screen-cats">
      <div class="alerts-cat-hdr">
        <div style="font-size:0.64rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.1em;">Flag Categories</div>
        <button class="new-flag-btn" onclick="openFlagModal()">+ New Flag</button>
      </div>
      <div id="cat-grid"></div>
    </div>
    <div class="screen hidden" id="screen-list">
      <div class="list-hdr">
        <button class="list-back" onclick="showCats()">← Back</button>
        <div class="list-title" id="list-title">All Flags</div>
        <div class="list-count" id="list-count"></div>
      </div>
      <div id="alert-list"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="nav-btn active" id="nav-overview" onclick="switchTab('overview')">

<script>
if(!sessionStorage.getItem('af_auth')) window.location.href='index.html';
function ls(k,d){try{return JSON.parse(localStorage.getItem('af_'+k))||d;}catch(e){return d;}}

const ME=sessionStorage.getItem('af_user')||'Manager';

// ── TRUCKS ──
const BASE=[
  {id:'AF-01',driver:'D. Shabalala',phone:'0821110001',status:'alert',flags:['OVERLOAD'],lat:-25.7562,lng:29.4421,speed:68,gross:171200,load:true,route:'Mine → Mill'},
  {id:'AF-02',driver:'F. Ngcobo',phone:'0821110002',status:'warning',flags:['HARD BRAKE'],lat:-25.8891,lng:29.3812,speed:52,gross:158400,load:true,route:'Mine → Mill'},
  {id:'AF-03',driver:'J. Mthembu',phone:'0821110003',status:'ok',flags:[],lat:-25.6234,lng:29.5102,speed:44,gross:162100,load:true,route:'Mine → Mill'},
  {id:'AF-04',driver:'A. Mokoena',phone:'0821110004',status:'warning',flags:['SPEEDING'],lat:-25.7123,lng:29.4650,speed:87,gross:155800,load:true,route:'Road'},
  {id:'AF-05',driver:'M. Zwane',phone:'0821110005',status:'ok',flags:[],lat:-25.9102,lng:29.4890,speed:38,gross:159800,load:true,route:'Mine → Mill'},
  {id:'AF-06',driver:'P. Dlamini',phone:'0821110006',status:'ok',flags:[],lat:-25.7890,lng:29.5340,speed:41,gross:161200,load:true,route:'Mine → Mill'},
  {id:'AF-07',driver:'B. Khumalo',phone:'0821110007',status:'idle',flags:[],lat:-25.00,lng:29.00,speed:0,gross:0,load:false,route:'Depot'},
  {id:'AF-08',driver:'T. Nkosi',phone:'0821110008',status:'ok',flags:[],lat:-25.8456,lng:29.5678,speed:35,gross:158900,load:true,route:'Mill → Mine'},
  {id:'AF-09',driver:'S. Mahlangu',phone:'0821110009',status:'ok',flags:[],lat:-25.7234,lng:29.3890,speed:29,gross:160400,load:true,route:'Mine → Mill'},
  {id:'AF-10',driver:'R. Sithole',phone:'0821110010',status:'idle',flags:[],lat:-25.02,lng:29.02,speed:0,gross:0,load:false,route:'Depot'},
  {id:'UT-R01',driver:'D. Shabalala',phone:'0821110001',status:'alert',flags:['OVERLOAD'],lat:-25.78,lng:29.43,speed:22,gross:172400,load:true,route:'Mine → Mill'},
];
let trucks=ls('trucks_live',BASE);

// ── FLAG CATEGORIES ──
const CATS=[
  {id:'OVERLOAD',   label:'Overload',         desc:'Gross exceeds mine permit GCM'},
  {id:'SPEEDING',   label:'Speeding',          desc:'Speed exceeds road or mine limit'},
  {id:'HIGH REVVING',label:'High Revving',     desc:'Engine RPM above 2,000 RPM'},
  {id:'HARD BRAKE', label:'Hard Braking',      desc:'Deceleration >= 0.265G'},
  {id:'UNDERLOAD',  label:'Underload',         desc:'Nett weight below minimum'},
  {id:'OFF-ROUTE',  label:'Off-Route',         desc:'Vehicle outside designated zone'},
  {id:'EXCESSIVE IDLE',label:'Excessive Idle', desc:'Stationary beyond permitted time'},
  {id:'MODULE FAULT',label:'Module Fault',     desc:'Sensor offline or reading error'},
];

// ── OPS LOG ──
function tsNow(override){
  const d=new Date();
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const hm=override||(String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'));
  return hm+' · '+String(d.getDate()).padStart(2,'0')+' '+months[d.getMonth()];
}

let opsLog=[
  {ts:tsNow('14:33'),txt:'AF-09 - SYSTEM: MODULE FAULT - M3-B offline, TKT-0001 raised'},
  {ts:tsNow('14:31'),txt:'UT-R01 - SYSTEM: OVERLOAD flag raised - 172,400 kg'},
  {ts:tsNow('14:30'),txt:'AF-01 - SYSTEM: OVERLOAD flag raised - 171,200 kg'},
  {ts:tsNow('14:22'),txt:'AF-02 - SYSTEM: HARD BRAKE flag raised - 0.51G'},
  {ts:tsNow('14:18'),txt:'AF-04 - SYSTEM: SPEEDING flag raised - 87 km/h'},
];

const LOG_SIM=[
  'AF-01 - K. Nkosi: OVERLOAD escalated to Almó Esterhuizen',
  'AF-04 - K. Nkosi: Driver called - A. Mokoena, SPEEDING follow-up',
  'AF-04 - K. Nkosi: SPEEDING cleared - driver confirmed speed reduced',
  'AF-02 - SYSTEM: HARD BRAKE flag raised - 0.38G, second event',
  'AF-02 - K. Nkosi: SMS sent to manager - HARD BRAKE, F. Ngcobo',
  'UT-R01 - Almó Esterhuizen: OVERLOAD cleared - load adjusted',
  'AF-06 - SYSTEM: EXCESSIVE IDLE flag raised - 34 min',
  'AF-01 - K. Nkosi: Note added - driver warned, monitoring',
  'AF-06 - R. Botha: EXCESSIVE IDLE cleared - truck departed',
  'AF-09 - R. Botha: MODULE FAULT escalated to maintenance - TKT-0001',
];
let simIdx=0;

function addLog(txt){
  opsLog.unshift({ts:tsNow(),txt});
  if(opsLog.length>20) opsLog=opsLog.slice(0,20);
  if(document.getElementById('pane-overview').classList.contains('active')) renderLog();
}

setInterval(()=>{
  addLog(LOG_SIM[simIdx%LOG_SIM.length]);
  simIdx++;
},10000);

function renderLog(){
  document.getElementById('log-count').textContent=opsLog.length+' entries';
  document.getElementById('ops-log').innerHTML=opsLog.slice(0,20).map(e=>`
    <div class="ops-log-row">
      <span class="ops-log-ts">${e.ts}</span>
      <span class="ops-log-dash">-</span>
      <span class="ops-log-txt">${e.txt}</span>
    </div>`).join('');
}

// ── CLOCK ──
function tick(){document.getElementById('mob-clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
setInterval(tick,1000);tick();

// ── TABS ──
function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='overview'){renderStats();renderLog();}
  if(tab==='fleet') renderFleet();
  if(tab==='alerts') renderCats();
}

// ── STATS ──
function renderStats(){
  trucks=ls('trucks_live',BASE);
  const active=trucks.filter(t=>t.status!=='idle').length;
  const alerts=trucks.filter(t=>t.status==='alert'||t.status==='warning').length;
  const loaded=trucks.filter(t=>t.load).length;
  const idle=trucks.filter(t=>t.status==='idle').length;
  document.getElementById('ov-active').textContent=active;
  document.getElementById('ov-alerts').textContent=alerts;
  document.getElementById('ov-loaded').textContent=loaded;
  document.getElementById('ov-idle').textContent=idle;
  document.getElementById('ov-overloads').textContent=trucks.filter(t=>(t.flags||[]).includes('OVERLOAD')).length;
  document.getElementById('health-bar').innerHTML=`
    <div class="health-seg" style="flex:${loaded};background:var(--green);"></div>
    <div class="health-seg" style="flex:${trucks.filter(t=>t.status==='warning').length};background:var(--amber);"></div>
    <div class="health-seg" style="flex:${trucks.filter(t=>t.status==='alert').length};background:var(--red);"></div>
    <div class="health-seg" style="flex:${idle};background:#CBD5E1;"></div>`;
  const badge=document.getElementById('nav-badge');
  badge.textContent=alerts;
  badge.style.display=alerts>0?'flex':'none';
}

// ── FLEET ──
function renderFleet(){
  trucks=ls('trucks_live',BASE);
  const q=document.getElementById('fleet-search').value.toLowerCase();
  const sorted=[...trucks].sort((a,b)=>{const o={alert:0,warning:1,ok:2,idle:3};return o[a.status]-o[b.status];});
  const list=sorted.filter(t=>!q||(t.id.toLowerCase().includes(q)||t.driver.toLowerCase().includes(q)));
  const el=document.getElementById('fleet-list');
  if(!list.length){el.innerHTML='<p style="color:var(--sub);text-align:center;padding:20px;font-size:0.85rem;">No trucks found.</p>';return;}
  el.innerHTML=list.map(t=>{
    const dc=t.status==='alert'?'red':t.status==='warning'?'amber':t.status==='idle'?'muted':'green';
    const hasFlag=t.flags&&t.flags.length;
    const grossStr=t.gross>0?(t.gross/1000).toFixed(1)+'t':'Empty';
    return `<div class="fleet-card ${hasFlag?(t.status==='alert'?'has-flag':'has-warn'):''}">
      <div class="fleet-row">
        <div class="fc-dot ${dc}"></div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="fc-tap-id" onclick="toggleRaw('${t.id}')">${t.id}</span>
            <span class="fc-driver">${t.driver}</span>
          </div>
          <div class="fc-route">${t.route}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-right:4px;">
          <div class="fc-weight">${grossStr}</div>
          <div class="fc-speed">${t.speed>0?t.speed+' km/h':'Stopped'}</div>
        </div>
        <span class="fc-chev" id="chev-${t.id}" onclick="toggleDet('${t.id}')">▾</span>
      </div>
      <div class="raw-panel" id="raw-${t.id}">${buildRaw(t)}</div>
      <div class="det-panel" id="det-${t.id}">${buildDet(t)}</div>
    </div>`;
  }).join('');
}

function toggleRaw(id){
  const r=document.getElementById('raw-'+id);
  const d=document.getElementById('det-'+id);
  const c=document.getElementById('chev-'+id);
  const open=!r.classList.contains('open');
  r.classList.toggle('open',open);
  if(open){d.classList.remove('open');if(c)c.classList.remove('open');}
}

function toggleDet(id){
  const d=document.getElementById('det-'+id);
  const r=document.getElementById('raw-'+id);
  const c=document.getElementById('chev-'+id);
  const open=d.classList.toggle('open');
  if(c)c.classList.toggle('open',open);
  if(open) r.classList.remove('open');
}

function buildRaw(t){
  const ts=tsNow();
  const go=t.gross<168000;
  const so=t.speed<80;
  const nett=t.gross>0?Math.round(t.gross*0.68):0;
  const m1=t.gross>0?Math.round(t.gross*0.12):0;
  const m2=t.gross>0?Math.round(t.gross*0.11):0;
  const evt=t.speed>0?'DRIVING_FULL':t.gross>0?'LOADING':'WAITING';
  return `<div class="raw-panel-hdr">
    <span class="raw-hdr-title">Raw Packet - ${t.id}</span>
    <span class="raw-live"><span class="raw-live-dot"></span>Live - ${ts}</span>
  </div>
  <div class="raw-section-title">Packet</div>
  <div class="raw-row"><span class="raw-k">TIMESTAMP</span><span class="raw-v">${ts}</span></div>
  <div class="raw-row"><span class="raw-k">UNIT</span><span class="raw-v">${t.id}</span></div>
  <div class="raw-row"><span class="raw-k">EVENT</span><span class="raw-v flag">${evt}</span></div>
  <div class="raw-section-title">Load Data</div>
  <div class="raw-row"><span class="raw-k">GROSS_KG</span><span class="raw-v ${go?'ok':'bad'}">${t.gross.toLocaleString()}</span></div>
  <div class="raw-row"><span class="raw-k">NETT_KG</span><span class="raw-v">${nett.toLocaleString()}</span></div>
  <div class="raw-row"><span class="raw-k">M1_A</span><span class="raw-v ok">${m1.toLocaleString()}</span></div>
  <div class="raw-row"><span class="raw-k">M1_B</span><span class="raw-v ok">${m2.toLocaleString()}</span></div>
  <div class="raw-section-title">Location & Vehicle</div>
  <div class="raw-row"><span class="raw-k">LAT</span><span class="raw-v">${t.lat.toFixed(5)}</span></div>
  <div class="raw-row"><span class="raw-k">LNG</span><span class="raw-v">${t.lng.toFixed(5)}</span></div>
  <div class="raw-row"><span class="raw-k">SPEED_KMH</span><span class="raw-v ${so?'':'bad'}">${t.speed}</span></div>
  <div class="raw-row"><span class="raw-k">SIGNAL</span><span class="raw-v ok">STRONG</span></div>
  <div class="raw-section-title">Driver & Hardware</div>
  <div class="raw-row"><span class="raw-k">DRIVER_ID</span><span class="raw-v">DRV-100${t.id.slice(-1)}</span></div>
  <div class="raw-row"><span class="raw-k">LOGIN</span><span class="raw-v ok">FINGERPRINT_OK</span></div>
  <div class="raw-row"><span class="raw-k">ACCEL_G</span><span class="raw-v ok">0.03</span></div>
  <div class="raw-row"><span class="raw-k">BATTERY_V</span><span class="raw-v ok">3.98</span></div>
  <div class="raw-row"><span class="raw-k">NEXT_PKT</span><span class="raw-v">+2 min</span></div>`;
}

function buildDet(t){
  const grossOv=t.gross>168000;
  const savedNote=ls('note_'+t.id,'');
  const log=ls('activity_log_'+t.id,[]);
  const defLog=[
    {ts:'14:28',txt:'Load event - '+(t.gross||0).toLocaleString()+' kg'},
    {ts:'05:48',txt:'Driver login - '+t.driver},
  ];
  if(t.id==='AF-09') defLog.unshift({ts:'14:33',txt:'TKT-0001 - M3-B offline'});
  const allLog=[...log,...defLog].slice(0,5);
  const flagsHtml=(t.flags&&t.flags.length)?`<div class="det-flags">${t.flags.map(f=>`
    <div class="det-flag-row ${t.status==='warning'?'warn':''}">
      <span class="det-flag-txt">${f}</span>
      <div class="det-flag-btns">
        <button class="det-flag-btn" onclick="doEscalate('${t.id}','${f}')">Escalate</button>
        <button class="det-flag-btn" onclick="doClear('${t.id}','${f}')">Clear</button>
      </div>
    </div>`).join('')}</div>`:'';
  return `<div class="det-grid">
    <div class="det-item"><div class="det-lbl">Gross</div><div class="det-val ${grossOv?'over':''}">${t.gross>0?(t.gross/1000).toFixed(1)+'t':'—'}</div></div>
    <div class="det-item"><div class="det-lbl">Speed</div><div class="det-val">${t.speed>0?t.speed+' km/h':'Stopped'}</div></div>
    <div class="det-item"><div class="det-lbl">Route</div><div class="det-val">${t.route}</div></div>
    <div class="det-item"><div class="det-lbl">Status</div><div class="det-val">${t.status}</div></div>
  </div>
  ${flagsHtml}
  <div class="det-action-row">
    <a href="tel:${t.phone}" class="det-btn" onclick="return confirm('Call ${t.driver}?')">Call</a>
    <a href="https://maps.google.com/?q=${t.lat},${t.lng}" target="_blank" class="det-btn">Map</a>
    <button class="det-btn" onclick="openFlagModal('${t.id}')">Flag</button>
  </div>
  <div class="note-area">
    <div class="note-lbl">Note <button class="note-save-btn" id="nsb-${t.id}" onclick="saveNote('${t.id}')">Save</button></div>
    <textarea class="note-ta" id="note-${t.id}" placeholder="Add note...">${savedNote}</textarea>
  </div>
  <div class="act-log-area">
    <div class="act-log-title">Activity Log</div>
    ${allLog.map(l=>`<div class="act-log-row"><span class="act-log-ts">${l.ts||'--:--'}</span><span class="act-log-dash">-</span><span class="act-log-txt">${l.txt}</span></div>`).join('')}
  </div>`;
}

// ── ALERTS ──
function getFeed(){
  const feed=ls('mob_feed',[]);
  trucks.forEach(t=>{
    (t.flags||[]).forEach(f=>{
      const key=t.id+'__'+f;
      if(!feed.find(a=>a.key===key)){
        feed.unshift({key,tid:t.id,driver:t.driver,phone:t.phone,flag:f,status:t.status,gross:t.gross,speed:t.speed,route:t.route,ts:tsNow(),state:'active',log:[{ts:tsNow(),txt:'Flag raised - '+f}]});
      }
    });
  });
  ss('mob_feed',feed);
  return feed;
}

let currentCat=null;

function renderCats(){
  showCats();
  const feed=getFeed().filter(a=>a.state!=='cleared');
  const el=document.getElementById('cat-grid');
  const total=feed.length;
  let html=`<div class="cat-card" onclick="showList('ALL','All Active Flags')">
    <div class="cat-accent" style="background:${total>0?'var(--red)':'var(--border)'}"></div>
    <div class="cat-body"><div class="cat-name">All Active Flags</div><div class="cat-desc">Every active flag across the fleet</div></div>
    <div class="cat-right"><div class="cat-count ${total>0?'live':''}">${total}</div><div class="cat-count-lbl">Active</div></div>
    <div class="cat-arrow">›</div>
  </div>`;
  CATS.forEach(c=>{
    const n=feed.filter(a=>a.flag===c.id).length;
    html+=`<div class="cat-card" onclick="showList('${c.id}','${c.label}')">
      <div class="cat-accent" style="background:${n>0?'var(--red)':'var(--border)'}"></div>
      <div class="cat-body"><div class="cat-name">${c.label}</div><div class="cat-desc">${c.desc}</div></div>
      <div class="cat-right"><div class="cat-count ${n>0?'live':''}">${n}</div><div class="cat-count-lbl">Active</div></div>
      <div class="cat-arrow">›</div>
    </div>`;
  });
  el.innerHTML=html;
}

function showList(cat,title){
  currentCat=cat;
  document.getElementById('screen-cats').classList.add('hidden');
  document.getElementById('screen-list').classList.remove('hidden');
  document.getElementById('list-title').textContent=title;
  renderList(cat);
}
function showCats(){
  document.getElementById('screen-list').classList.add('hidden');
  document.getElementById('screen-cats').classList.remove('hidden');
  currentCat=null;
}

function renderList(cat){
  let feed=getFeed();
  if(cat!=='ALL') feed=feed.filter(a=>a.flag===cat);
  const active=feed.filter(a=>a.state!=='cleared');
  const cleared=feed.filter(a=>a.state==='cleared');
  document.getElementById('list-count').textContent=active.length+' active';
  const mkCard=(a,idx)=>{
    const isAlert=a.state==='active'&&a.status==='alert';
    const isWarn=a.state==='active'&&a.status==='warning';
    const isEsc=a.state==='escalated';
    const isCleared=a.state==='cleared';
    const topCls=isCleared?'b-cleared':isEsc?'b-esc':isAlert?'b-alert':'b-warn';
    const badge=isCleared?'Cleared':isEsc?'Escalated':a.flag;
    const grossStr=a.gross>0?(a.gross/1000).toFixed(1)+'t':'—';
    const uid='al_'+cat+'_'+idx;
    const logHtml=a.log.slice(0,4).map(l=>`<div class="al-row"><span class="al-ts">${l.ts}</span><span class="al-dash">-</span><span class="al-txt">${l.txt}</span></div>`).join('');
    return `<div class="alert-card ${isWarn?'warn':isEsc?'escalated':isCleared?'cleared':''}">
      <div class="alert-card-top">
        <div style="display:flex;align-items:center;flex:1;min-width:0;">
          <div>
            <div class="act-truck">${a.tid} — ${a.driver}</div>
            <div class="act-driver">${a.route||''}</div>
          </div>
        </div>
        <span class="act-badge ${topCls}">${badge}</span>
      </div>
      <div class="alert-stats">
        <div class="a-stat"><div class="a-stat-val ${a.gross>168000?'over':''}">${grossStr}</div><div class="a-stat-lbl">Gross</div></div>
        <div class="a-stat"><div class="a-stat-val">${a.speed>0?a.speed+' km/h':'Stopped'}</div><div class="a-stat-lbl">Speed</div></div>
        <div class="a-stat"><div class="a-stat-val" style="font-size:0.72rem;color:var(--sub);">${a.ts.split(' · ')[0]}</div><div class="a-stat-lbl">Flagged</div></div>
      </div>
      <button class="alert-log-toggle" onclick="toggleAlLog('${uid}',this)"><span>Activity Log (${a.log.length})</span><span>▾</span></button>
      <div class="alert-log-body" id="${uid}">${logHtml}</div>
      ${!isCleared?`<div class="alert-actions">
        <button class="alert-action" onclick="callDrv('${a.phone}','${a.driver}')"><span class="alert-action-icon">📞</span>Call</button>
        ${!isEsc
          ?`<button class="alert-action" onclick="doEscAlert('${a.key}')"><span class="alert-action-icon">↑</span>Escalate</button>`
          :`<button class="alert-action" style="opacity:0.4;pointer-events:none;"><span class="alert-action-icon">✓</span>Escalated</button>`}
        <button class="alert-action" onclick="clearAlert('${a.key}')"><span class="alert-action-icon">✓</span>Clear</button>
        <button class="alert-action" onclick="openSMS('${a.key}')"><span class="alert-action-icon">✉</span>SMS</button>
      </div>`:`<div class="cleared-note">Cleared — no further action needed</div>`}
    </div>`;
  };
  const el=document.getElementById('alert-list');
  if(!active.length&&!cleared.length){
    el.innerHTML='<div class="all-clear"><div class="all-clear-icon">✅</div><div class="all-clear-title">No Flags</div><div class="all-clear-sub">Nothing active in this category</div></div>';
    return;
  }
  el.innerHTML=active.map(mkCard).join('')+(cleared.length?`<div class="section-hdr" style="margin-top:20px;">Cleared <span class="hdr-pill">${cleared.length}</span></div>`+cleared.map(mkCard).join(''):'');
}

function toggleAlLog(id,btn){
  const el=document.getElementById(id);if(!el)return;
  const o=el.classList.toggle('open');
  btn.querySelector('span:last-child').textContent=o?'▴':'▾';
}

// ── ACTIONS ──
function callDrv(phone,name){if(confirm('Call '+name+'?'))window.location.href='tel:'+phone;}

let pendingClear=null;
function doClear(tid,flag){
  pendingClear={tid,flag,source:'truck'};
  document.getElementById('clear-txt').textContent='Clear "'+flag+'" on '+tid+'?';
  document.getElementById('clear-modal').classList.add('open');
}
function clearAlert(key){
  pendingClear={key,source:'alert'};
  const a=getFeed().find(x=>x.key===key);
  if(a) document.getElementById('clear-txt').textContent='Clear "'+a.flag+'" on '+a.tid+'?';
  document.getElementById('clear-modal').classList.add('open');
}
function confirmClear(){
  closeModal('clear-modal');
  const ts=tsNow();
  if(pendingClear.source==='alert'){
    const feed=getFeed();const a=feed.find(x=>x.key===pendingClear.key);
    if(a){a.state='cleared';a.log.unshift({ts,txt:ME+': Flag cleared'});ss('mob_feed',feed);}
    const t=trucks.find(x=>x.id===(a&&a.tid));
    if(t&&a){t.flags=(t.flags||[]).filter(f=>f!==a.flag);if(!t.flags.length)t.status=t.load?'ok':'idle';}
    addLog((a?a.tid:'—')+' - '+ME+': '+( a?a.flag:'flag')+' cleared');
  } else {
    const t=trucks.find(x=>x.id===pendingClear.tid);
    if(t){t.flags=(t.flags||[]).filter(f=>f!==pendingClear.flag);if(!t.flags.length)t.status=t.load?'ok':'idle';
      const log=ls('activity_log_'+t.id,[]);log.unshift({ts,txt:ME+': Flag cleared - '+pendingClear.flag+' [Mobile]'});ss('activity_log_'+t.id,log);}
    addLog(pendingClear.tid+' - '+ME+': '+pendingClear.flag+' cleared');
  }
  ss('trucks_live',trucks);
  if(currentCat)renderList(currentCat);
  else renderCats();
  renderStats();
  pendingClear=null;
}

function doEscalate(tid,flag){
  const feed=getFeed();const key=tid+'__'+flag;
  let a=feed.find(x=>x.key===key);
  if(!a){const t=trucks.find(x=>x.id===tid);if(!t)return;a={key,tid,driver:t.driver,phone:t.phone,flag,status:t.status,gross:t.gross,speed:t.speed,route:t.route,ts:tsNow(),state:'active',log:[]};feed.unshift(a);}
  const ts=tsNow();
  const users=ls('users',[{id:'USR-0002',name:'K. Nkosi'}]);
  const mgr=(users.find(u=>u.id==='USR-0002')||{name:'K. Nkosi'}).name;
  a.state='escalated';a.log.unshift({ts,txt:ME+': Escalated to '+mgr});
  ss('mob_feed',feed);
  addLog(tid+' - '+ME+': '+flag+' escalated to '+mgr);
  alert('Escalated to '+mgr+'\nLogged at '+ts);
  if(currentCat)renderList(currentCat);
}
function doEscAlert(key){
  const a=getFeed().find(x=>x.key===key);
  if(a) doEscalate(a.tid,a.flag);
}

// SMS
let smsPendingKey=null;
function openSMS(key){
  const a=getFeed().find(x=>x.key===key);if(!a)return;
  smsPendingKey=key;
  const users=ls('users',[{id:'USR-0001',name:'Almó Esterhuizen',phone:'0613603411'},{id:'USR-0002',name:'K. Nkosi',phone:'0821234567'}]);
  const mgr=users.find(u=>u.id==='USR-0002')||users[0];
  document.getElementById('sms-title').textContent='SMS - '+a.flag;
  document.getElementById('sms-sub').textContent=a.tid+' · '+a.driver;
  document.getElementById('sms-to').innerHTML='To: <strong>'+mgr.name+'</strong> · '+mgr.phone;
  document.getElementById('sms-body').textContent=
'[AxisFleet ALERT]\nFlag: '+a.flag+'\nUnit: '+a.tid+'\nDriver: '+a.driver+'\nGross: '+(a.gross>0?a.gross.toLocaleString()+' kg':'—')+'\nSpeed: '+(a.speed>0?a.speed+' km/h':'Stopped')+'\nRoute: '+(a.route||'—')+'\nTime: '+a.ts+'\nAction required.';
  document.getElementById('sms-modal').classList.add('open');
}
function confirmSMS(){
  const ts=tsNow();
  const feed=getFeed();const a=feed.find(x=>x.key===smsPendingKey);
  if(a){a.log.unshift({ts,txt:ME+': SMS sent to manager'});ss('mob_feed',feed);}
  addLog((a?a.tid:'—')+' - '+ME+': SMS sent - '+(a?a.flag:'alert'));
  closeModal('sms-modal');
  if(currentCat)renderList(currentCat);
  alert('SMS logged as sent.\n(Backend required to deliver.)');
  smsPendingKey=null;
}

// Flag modal
function openFlagModal(truckId){
  const sel=document.getElementById('fm-truck');
  sel.innerHTML=trucks.map(t=>`<option value="${t.id}" ${t.id===truckId?'selected':''}>${t.id} - ${t.driver}</option>`).join('');
  document.getElementById('flag-modal').classList.add('open');
}
function confirmFlag(){
  const tid=document.getElementById('fm-truck').value;
  const flag=document.getElementById('fm-type').value;
  const t=trucks.find(x=>x.id===tid);if(!t){closeModal('flag-modal');return;}
  if(!t.flags)t.flags=[];
  if(!t.flags.includes(flag))t.flags.push(flag);
  t.status='alert';
  const ts=tsNow();
  const log=ls('activity_log_'+t.id,[]);
  log.unshift({ts,txt:ME+': Flag raised manually - '+flag+' [Mobile]'});
  ss('activity_log_'+t.id,log);
  ss('trucks_live',trucks);
  const feed=getFeed();
  const key=t.id+'__'+flag+'__'+Date.now();
  feed.unshift({key,tid:t.id,driver:t.driver,phone:t.phone,flag,status:'alert',gross:t.gross,speed:t.speed,route:t.route,ts,state:'active',log:[{ts,txt:ME+': Flag raised manually'}]});
  ss('mob_feed',feed);
  addLog(t.id+' - '+ME+': '+flag+' flag raised manually');
  closeModal('flag-modal');
  renderStats();renderCats();
}

function saveNote(id){
  const ta=document.getElementById('note-'+id);const btn=document.getElementById('nsb-'+id);
  if(!ta||!ta.value.trim())return;
  ss('note_'+id,ta.value.trim());
  const ts=tsNow();
  const log=ls('activity_log_'+id,[]);
  log.unshift({ts,txt:ME+': '+ta.value.trim()+' [Mobile]'});
  ss('activity_log_'+id,log);
  addLog(id+' - '+ME+': Note added');
  if(btn){btn.textContent='Saved';btn.classList.add('saved');setTimeout(()=>{btn.textContent='Save';btn.classList.remove('saved');},2000);}
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function refreshAll(){
  trucks=ls('trucks_live',BASE);
  renderStats();
}
setInterval(refreshAll,10000);

// INIT
renderStats();
renderLog();
</script>
</body>
</html>
