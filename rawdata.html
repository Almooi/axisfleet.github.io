<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxisFleet — OPS | Raw Data</title>
<link rel="icon" href="favicon.ico"/>
<link rel="stylesheet" href="af_style.css"/>

<style>
html,body{height:100%;background:#EAEEF4;display:flex;flex-direction:column;overflow:hidden;}
.page-body{flex:1;display:flex;overflow:hidden;gap:0;}
/* LEFT UNIT LIST */
.unit-panel{width:220px;flex-shrink:0;background:white;border-right:1px solid #D1D9E3;display:flex;flex-direction:column;overflow:hidden;}
.unit-panel-header{padding:12px 14px;border-bottom:1px solid #E8EDF5;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.unit-panel-title{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.unit-list{flex:1;overflow-y:auto;}
.unit-section-label{padding:6px 14px;font-size:0.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;background:#F8FAFC;border-bottom:1px solid #E8EDF5;}
.unit-item{padding:11px 14px;border-bottom:1px solid #E8EDF5;cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:10px;}
.unit-item:hover{background:#F4F7FB;}
.unit-item.active{background:#DBEAFE;border-left:3px solid var(--blue);}
.unit-item.multi-selected{background:#FFF7ED;border-left:3px solid var(--orange);}
.unit-item.offline{opacity:0.6;}
.unit-id{font-size:0.85rem;font-weight:700;color:var(--navy);}
.unit-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0;}
.offline-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
/* MAIN AREA */
.data-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.data-toolbar{background:white;border-bottom:1px solid #D1D9E3;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.mode-btn{padding:7px 18px;font-size:0.78rem;font-weight:700;font-family:'Barlow',sans-serif;border:1px solid #D1D9E3;background:white;color:var(--muted);cursor:pointer;transition:all 0.12s;text-transform:uppercase;letter-spacing:0.04em;}
.mode-btn.active{background:var(--navy);color:white;border-color:var(--navy);}
.month-tabs{display:flex;gap:4px;margin-left:8px;}
.month-tab{padding:6px 14px;font-size:0.75rem;font-weight:700;font-family:'Barlow',sans-serif;border:1px solid #D1D9E3;background:white;color:var(--muted);cursor:pointer;transition:all 0.12s;display:none;}
.month-tab.show{display:inline-block;}
.month-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
.hist-actions{margin-left:auto;display:none;gap:8px;align-items:center;}
.hist-actions.show{display:flex;}
.select-all-btn{font-size:0.75rem;font-weight:700;color:var(--blue);background:none;border:1px solid var(--blue);padding:5px 12px;cursor:pointer;font-family:'Barlow',sans-serif;}
.dl-btn{background:var(--orange);color:white;border:none;padding:7px 16px;font-size:0.78rem;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;}
.dl-btn:hover{background:#e85c28;}
.packets-area{flex:1;overflow-y:auto;padding:16px 18px;}
/* PACKET BLOCK */
.packet-block{background:white;border:1px solid #D1D9E3;margin-bottom:12px;font-family:'Courier New',monospace;}
.packet-block-header{background:var(--navy);color:white;padding:7px 14px;display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;}
.pkt-id{font-weight:700;letter-spacing:0.05em;}
.pkt-ts{color:rgba(255,255,255,0.6);font-size:0.7rem;}
.live-indicator{background:var(--green);color:white;font-size:0.62rem;font-weight:700;padding:2px 8px;letter-spacing:0.06em;}
.packet-body{padding:12px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.pkt-section{}
.pkt-section-title{font-size:0.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #E8EDF5;font-family:'Barlow',sans-serif;}
.pkt-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #F4F7FB;font-size:0.72rem;}
.pkt-row:last-child{border-bottom:none;}
.pkt-key{color:var(--muted);}
.pkt-val{font-weight:600;color:var(--navy);}
.pkt-val.red{color:var(--red);}
.pkt-val.green{color:var(--green);}
.pkt-val.amber{color:var(--amber);}
.pkt-val.blue{color:var(--blue);}
/* RAW FEED */
.raw-feed-wrap{background:var(--navy);border-top:1px solid rgba(255,255,255,0.08);padding:10px 14px;flex-shrink:0;height:120px;overflow-y:auto;}
.raw-feed-label{font-size:0.62rem;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;font-family:'Barlow',sans-serif;}
.raw-line{font-family:'Courier New',monospace;font-size:0.7rem;color:rgba(255,255,255,0.45);padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.raw-ts{color:var(--blue);}
.raw-ev{color:var(--orange);}
/* offline last seen */
.offline-notice{background:#FEF3C7;border:1px solid #FDE68A;padding:12px 16px;margin-bottom:12px;font-size:0.82rem;color:#92400E;font-family:'Barlow',sans-serif;}
</style>
</head>
<body>
<nav class="topnav">
  <a href="hub.html" class="nav-logo-link">

  </a>

<div class="page-body">
  <!-- UNIT LIST -->
  <div class="unit-panel">
    <div class="unit-panel-header">
      <span class="unit-panel-title">Units</span>
      <span style="font-size:0.68rem;color:var(--blue);font-weight:700;" id="unit-count"></span>
    </div>
    <div class="unit-list" id="unit-list"></div>
  </div>

  <!-- DATA AREA -->
  <div class="data-area">
    <div class="data-toolbar">
      <button class="mode-btn active" id="btn-live">Live Feed</button>
      <button class="mode-btn" id="btn-hist">Historical</button>
      <div class="month-tabs" id="month-tabs">
        <button class="month-tab show active" data-month="apr">April 2026</button>
        <button class="month-tab show" data-month="mar">March 2026</button>
        <button class="month-tab show" data-month="feb">February 2026</button>
        <button class="month-tab show" data-month="jan">January 2026</button>
      </div>
      <div class="hist-actions" id="hist-actions">
        <button class="select-all-btn" id="select-all-btn">Select All</button>
        <button class="dl-btn" id="download-btn">↓ Download Selected</button>
      </div>
    </div>
    <div class="packets-area" id="packets-area"></div>
    <div class="raw-feed-wrap">
      <div class="raw-feed-label">Raw Transmission Log</div>
      <div id="raw-feed"></div>
    </div>
  </div>

<script>
if(!sessionStorage.getItem('af_auth')) window.location.href='index.html';
document.getElementById('nav-user').textContent=sessionStorage.getItem('af_user')||'Admin';
document.getElementById('nav-logout').addEventListener('click',()=>{if(confirm('Log out?')){sessionStorage.clear();window.location.href='index.html';}});

function load(key,def){try{return JSON.parse(localStorage.getItem('af_'+key))||def;}catch(e){return def;}}

const TRUCKS_DATA = AF_DATA.trucks;
const PACKETS = AF_DATA.packets;

let mode = 'live';
let selectedUnit = null;
let selectedUnitsHist = new Set();
let currentMonth = 'apr';
let allSelected = false;

// ── BUILD UNIT LIST ──
function buildUnitList(){
  const trucks = load('trucks', TRUCKS_DATA);
  const liveFirst = [...trucks].sort((a,b)=>{
    const aLive = a.id==='AF-09'; // AF-09 has GW-885
    const bLive = b.id==='AF-09';
    if(aLive&&!bLive)return -1;
    if(!aLive&&bLive)return 1;
    const aOff = !a.unit||a.status==='No Unit';
    const bOff = !b.unit||b.status==='No Unit';
    return aOff-bOff;
  });

  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  document.getElementById('unit-count').textContent = trucks.length + ' units';

  let shownLive=false, shownOffline=false;
  liveFirst.forEach(t=>{
    const isLive = t.id==='AF-09';
    const isOffline = !t.unit || t.status==='No Unit' || t.status==='Low Battery'&&!t.unit;
    if(isLive&&!shownLive){
      const lbl=document.createElement('div');lbl.className='unit-section-label';lbl.textContent='Live';
      list.appendChild(lbl);shownLive=true;
    } else if(!isLive&&shownLive&&!shownOffline&&liveFirst.indexOf(t)===1){
      const lbl=document.createElement('div');lbl.className='unit-section-label';lbl.textContent='Fleet Units';
      list.appendChild(lbl);
    }

    const div=document.createElement('div');
    div.className='unit-item'+(isOffline?' offline':'')+(selectedUnit===t.id?' active':'');
    if(mode==='hist'&&selectedUnitsHist.has(t.id)) div.classList.add('multi-selected');

    div.innerHTML=`<div class="${isLive?'live-dot':'offline-dot'}"></div><div><div class="unit-id">${t.id}</div><div class="unit-sub">${t.unit||'No unit'}${isLive?' · Live':isOffline?' · Offline':''}</div></div>`;
    div.addEventListener('click',()=>selectUnit(t.id,t));
    list.appendChild(div);
  });
}

function selectUnit(id, truck){
  if(mode==='hist'){
    if(selectedUnitsHist.has(id)) selectedUnitsHist.delete(id);
    else selectedUnitsHist.add(id);
    buildUnitList();
    renderHistPackets();
  } else {
    selectedUnit=id;
    buildUnitList();
    renderLivePackets(truck);
  }
}

// ── LIVE PACKETS ──
function renderLivePackets(truck){
  const area=document.getElementById('packets-area');
  if(!truck){area.innerHTML='<p style="color:var(--muted);padding:20px;font-size:0.85rem;">Select a unit to view incoming data.</p>';return;}

  const pkts = PACKETS[truck.id]||[];
  const isOffline = !truck.unit||truck.status==='No Unit';
  let html='';
  if(isOffline){
    html+=`<div class="offline-notice">⚠ Unit offline — showing last known data. Last seen: 2026-04-01 08:14:22</div>`;
  }

  pkts.forEach((p,i)=>{
    const grossColor = p.gross>56000?'red':p.gross>50000?'amber':'green';
    const spdColor = p.speed>80?'red':p.speed>60?'amber':'';
    const accelColor = p.accel_status!=='NORMAL'?'red':'green';
    const battColor = p.battery<3.2?'red':p.battery<3.6?'amber':'green';
    html+=`<div class="packet-block">
      <div class="packet-block-header">
        <span class="pkt-id">${p.pkt}</span>
        <span class="pkt-ts">${p.ts}</span>
        ${i===0&&!isOffline?'<span class="live-indicator">● LIVE</span>':''}
        <span style="font-size:0.7rem;color:rgba(255,255,255,0.5);">Unit: ${p.unit} · Gateway: ${p.gateway}</span>
      </div>
      <div class="packet-body">
        <div class="pkt-section">
          <div class="pkt-section-title">Load Data</div>
          <div class="pkt-row"><span class="pkt-key">Gross</span><span class="pkt-val ${grossColor}">${p.gross.toLocaleString()} kg</span></div>
          <div class="pkt-row"><span class="pkt-key">Nett</span><span class="pkt-val">${p.nett.toLocaleString()} kg</span></div>
          <div class="pkt-row"><span class="pkt-key">Module 1</span><span class="pkt-val">${p.m1.toLocaleString()}</span></div>
          <div class="pkt-row"><span class="pkt-key">Module 2</span><span class="pkt-val">${p.m2.toLocaleString()}</span></div>
          <div class="pkt-row"><span class="pkt-key">Module 3</span><span class="pkt-val">${p.m3.toLocaleString()}</span></div>
          <div class="pkt-row"><span class="pkt-key">Module 4</span><span class="pkt-val">${p.m4.toLocaleString()}</span></div>
          <div class="pkt-row"><span class="pkt-key">Module 5</span><span class="pkt-val">${p.m5.toLocaleString()}</span></div>
          <div class="pkt-row"><span class="pkt-key">Module 6</span><span class="pkt-val">${p.m6.toLocaleString()}</span></div>
        </div>
        <div class="pkt-section">
          <div class="pkt-section-title">Location & Vehicle</div>
          <div class="pkt-row"><span class="pkt-key">Latitude</span><span class="pkt-val">${p.lat}</span></div>
          <div class="pkt-row"><span class="pkt-key">Longitude</span><span class="pkt-val">${p.lng}</span></div>
          <div class="pkt-row"><span class="pkt-key">Speed</span><span class="pkt-val ${spdColor}">${p.speed} km/h</span></div>
          <div class="pkt-row"><span class="pkt-key">Event</span><span class="pkt-val blue">${p.event}</span></div>
          <div class="pkt-row"><span class="pkt-key">Signal</span><span class="pkt-val green">${p.signal}</span></div>
        </div>
        <div class="pkt-section">
          <div class="pkt-section-title">Driver Data</div>
          <div class="pkt-row"><span class="pkt-key">Driver ID</span><span class="pkt-val blue">${p.driver}</span></div>
          <div class="pkt-row"><span class="pkt-key">Login</span><span class="pkt-val">05:48:02</span></div>
          <div class="pkt-row"><span class="pkt-key">Method</span><span class="pkt-val">Fingerprint</span></div>
          <div class="pkt-row"><span class="pkt-key">Session</span><span class="pkt-val green">Active</span></div>
          <div class="pkt-row"><span class="pkt-key">Shift</span><span class="pkt-val amber">8h 44m</span></div>
        </div>
        <div class="pkt-section">
          <div class="pkt-section-title">Hardware</div>
          <div class="pkt-row"><span class="pkt-key">Accel</span><span class="pkt-val ${accelColor}">${p.accel_g}G</span></div>
          <div class="pkt-row"><span class="pkt-key">Status</span><span class="pkt-val ${accelColor}">${p.accel_status}</span></div>
          <div class="pkt-row"><span class="pkt-key">Battery</span><span class="pkt-val ${battColor}">${p.battery}V</span></div>
          <div class="pkt-row"><span class="pkt-key">Gateway</span><span class="pkt-val">${p.gateway}</span></div>
          <div class="pkt-row"><span class="pkt-key">Modules</span><span class="pkt-val green">Active</span></div>
        </div>
      </div>
    </div>`;
  });
  area.innerHTML=html;
}

// ── HISTORICAL PACKETS ──
function renderHistPackets(){
  const area=document.getElementById('packets-area');
  if(selectedUnitsHist.size===0){
    area.innerHTML='<p style="color:var(--muted);padding:20px;font-size:0.85rem;">Select one or more units on the left to view historical data. Click multiple units to combine. Click Download to export.</p>';
    return;
  }
  const TRUCKS_DATA_LOCAL = load('trucks',TRUCKS_DATA);
  let html='';
  selectedUnitsHist.forEach(uid=>{
    const truck=TRUCKS_DATA_LOCAL.find(t=>t.id===uid);
    const pkts=PACKETS[uid]||[];
    const monthLabel={'apr':'April 2026','mar':'March 2026','feb':'February 2026','jan':'January 2026'}[currentMonth];
    html+=`<div style="font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:12px 0 8px;font-family:'Barlow',sans-serif;">${uid} — ${monthLabel}</div>`;
    pkts.slice(0,20).forEach(p=>{
      html+=`<div class="packet-block">
        <div class="packet-block-header">
          <span class="pkt-id">${p.pkt}</span>
          <span class="pkt-ts">${p.ts}</span>
          <span style="font-size:0.7rem;color:rgba(255,255,255,0.5);">Unit: ${p.unit}</span>
        </div>
        <div class="packet-body">
          <div class="pkt-section"><div class="pkt-section-title">Load Data</div>
            <div class="pkt-row"><span class="pkt-key">Gross</span><span class="pkt-val ${p.gross>56000?'red':p.gross>50000?'amber':'green'}">${p.gross.toLocaleString()} kg</span></div>
            <div class="pkt-row"><span class="pkt-key">Nett</span><span class="pkt-val">${p.nett.toLocaleString()} kg</span></div>
            <div class="pkt-row"><span class="pkt-key">Event</span><span class="pkt-val blue">${p.event}</span></div>
          </div>
          <div class="pkt-section"><div class="pkt-section-title">Location</div>
            <div class="pkt-row"><span class="pkt-key">Lat</span><span class="pkt-val">${p.lat}</span></div>
            <div class="pkt-row"><span class="pkt-key">Lng</span><span class="pkt-val">${p.lng}</span></div>
            <div class="pkt-row"><span class="pkt-key">Speed</span><span class="pkt-val">${p.speed} km/h</span></div>
          </div>
          <div class="pkt-section"><div class="pkt-section-title">Driver</div>
            <div class="pkt-row"><span class="pkt-key">ID</span><span class="pkt-val">${p.driver}</span></div>
            <div class="pkt-row"><span class="pkt-key">Method</span><span class="pkt-val">Fingerprint</span></div>
          </div>
          <div class="pkt-section"><div class="pkt-section-title">Hardware</div>
            <div class="pkt-row"><span class="pkt-key">Accel</span><span class="pkt-val">${p.accel_g}G</span></div>
            <div class="pkt-row"><span class="pkt-key">Battery</span><span class="pkt-val">${p.battery}V</span></div>
          </div>
        </div>
      </div>`;
    });
  });
  area.innerHTML=html;
}

// ── MODE SWITCH ──
document.getElementById('btn-live').addEventListener('click',()=>{
  mode='live';
  document.getElementById('btn-live').classList.add('active');
  document.getElementById('btn-hist').classList.remove('active');
  document.querySelectorAll('.month-tab').forEach(t=>t.style.display='none');
  document.getElementById('hist-actions').classList.remove('show');
  selectedUnitsHist.clear();
  buildUnitList();
  document.getElementById('packets-area').innerHTML='<p style="color:var(--muted);padding:20px;font-size:0.85rem;">Select a unit to view live data.</p>';
});
document.getElementById('btn-hist').addEventListener('click',()=>{
  mode='hist';
  document.getElementById('btn-hist').classList.add('active');
  document.getElementById('btn-live').classList.remove('active');
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.add('show'));
  document.getElementById('hist-actions').classList.add('show');
  selectedUnit=null;
  buildUnitList();
  renderHistPackets();
});

document.querySelectorAll('.month-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.month-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMonth=btn.dataset.month;
    renderHistPackets();
  });
});

// ── SELECT ALL ──
document.getElementById('select-all-btn').addEventListener('click',()=>{
  const trucks=load('trucks',TRUCKS_DATA);
  allSelected=!allSelected;
  if(allSelected){trucks.forEach(t=>selectedUnitsHist.add(t.id));document.getElementById('select-all-btn').textContent='Deselect All';}
  else{selectedUnitsHist.clear();document.getElementById('select-all-btn').textContent='Select All';}
  buildUnitList();renderHistPackets();
});

// ── DOWNLOAD ──
document.getElementById('download-btn').addEventListener('click',()=>{
  if(selectedUnitsHist.size===0){alert('Select at least one unit to download.');return;}
  const trucks=load('trucks',TRUCKS_DATA);
  let csv='Timestamp,Unit,Gateway,Latitude,Longitude,Speed,Module1,Module2,Module3,Module4,Module5,Module6,Nett,Gross,Event,Accel_G,Accel_Status,Battery,Driver,Signal\n';
  selectedUnitsHist.forEach(uid=>{
    const pkts=PACKETS[uid]||[];
    pkts.forEach(p=>{csv+=`${p.ts},${p.unit},${p.gateway},${p.lat},${p.lng},${p.speed},${p.m1},${p.m2},${p.m3},${p.m4},${p.m5},${p.m6},${p.nett},${p.gross},${p.event},${p.accel_g},${p.accel_status},${p.battery},${p.driver},${p.signal}\n`;});
  });
  const monthLabel={'apr':'Apr2026','mar':'Mar2026','feb':'Feb2026','jan':'Jan2026'}[currentMonth];
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`AxisFleet_RawData_${[...selectedUnitsHist].join('_')}_${monthLabel}.csv`;
  a.click();
});

// ── RAW FEED ──
const rawLines=[
  'PKT#600480|AF-09|GW-885|05:48:02|DRIVER_LOGIN|DRV-1008|FINGERPRINT_OK',
  'PKT#600481|AF-09|GW-885|06:02:14|ENGINE_START|LOC:-25.845,29.567|SPD:0',
  'PKT#600482|AF-09|GW-885|08:22:18|LOAD_EVENT|GROSS:158900kg|NETT:109200kg|STATUS:OK',
  'PKT#600483|AF-01|GW-201|09:14:07|OVERLOAD_FLAG|GROSS:171200kg|LIMIT:168000kg|DRV:DRV-1001',
  'PKT#600484|AF-09|GW-885|10:44:33|DRIVING_FULL|SPD:38km/h|LOC:-25.856,29.551',
  'PKT#600485|AF-02|GW-334|11:22:07|HARSH_BRAKING|G:0.31|SPD:52km/h',
  'PKT#600486|AF-09|GW-885|13:12:44|WAITING_OFFLOAD|SPD:0|GROSS:158400kg',
  'PKT#600487|AF-09|GW-885|14:32:18|HEARTBEAT|MODULES:12|BATT:3.32V|SIG:STRONG',
  'PKT#600488|AF-04|GW-512|14:44:01|SPEEDING|SPD:87km/h|LIMIT:80km/h|DRV:DRV-1004',
];
let rawIdx=0;
function appendRaw(){
  const el=document.getElementById('raw-feed');
  const line=rawLines[rawIdx%rawLines.length];rawIdx++;
  const ts=new Date().toLocaleTimeString();
  const p=line.split('|');
  const div=document.createElement('div');div.className='raw-line';
  div.innerHTML=`<span class="raw-ts">[${ts}]</span> <span class="raw-ev">${p[0]}</span> ${p.slice(1).join(' | ')}`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  if(el.children.length>30)el.removeChild(el.firstChild);
}
setInterval(appendRaw,3000);
setTimeout(()=>{appendRaw();appendRaw();appendRaw();},500);

// ── INIT ──
buildUnitList();
document.getElementById('packets-area').innerHTML='<p style="color:var(--muted);padding:20px;font-size:0.85rem;">Select a unit on the left to view incoming data packets.</p>';
</script>
