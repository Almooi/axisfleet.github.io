<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxisFleet — OPS</title>
<link rel="icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0D1B2A;--blue:#1E90FF;--orange:#FF6B35;--muted:#6B7C93;--red:#EF4444;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--navy);color:white;overflow:hidden;}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.login-wrap::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(30,144,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(30,144,255,0.04) 1px,transparent 1px);background-size:60px 60px;}
.login-wrap::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(30,144,255,0.07) 0%,transparent 70%);}
.login-box{position:relative;z-index:2;width:100%;max-width:400px;padding:0 20px;animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:40px;}
.login-logo img{height:56px;filter:drop-shadow(0 0 20px rgba(30,144,255,0.35));}
.login-card{background:rgba(15,34,54,0.92);border:1px solid rgba(30,144,255,0.2);padding:36px 32px;backdrop-filter:blur(16px);box-shadow:0 24px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);}
.login-heading{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
.login-sub{font-size:0.78rem;color:var(--muted);margin-bottom:28px;}
.field-label{display:block;font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;}
.field-input{width:100%;background:rgba(6,14,23,0.7);border:1px solid rgba(30,144,255,0.18);padding:11px 14px;color:white;font-size:0.9rem;font-family:'Barlow',sans-serif;outline:none;transition:border-color 0.15s,box-shadow 0.15s;margin-bottom:18px;border-radius:2px;}
.field-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,144,255,0.1);}
.field-input.shake{animation:shake 0.3s ease;border-color:var(--red);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-error{font-size:0.78rem;color:var(--red);margin-top:-12px;margin-bottom:16px;display:none;padding:8px 12px;background:rgba(239,68,68,0.08);border-left:3px solid var(--red);}
.login-btn{width:100%;background:var(--blue);color:white;border:none;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;}
.login-btn:hover{background:#1a7de0;box-shadow:0 4px 20px rgba(30,144,255,0.35);}
.login-btn:active{transform:scale(0.99);}
.login-footer{text-align:center;margin-top:20px;}
.reset-link{font-size:0.75rem;color:rgba(107,124,147,0.7);cursor:pointer;transition:color 0.15s;border:none;background:none;font-family:'Barlow',sans-serif;}
.reset-link:hover{color:var(--blue);}
.login-scripture{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:0.72rem;color:rgba(107,124,147,0.4);font-style:italic;white-space:nowrap;z-index:2;}
.loading-bar{position:fixed;top:0;left:0;height:2px;background:var(--blue);width:0;transition:width 1s ease;z-index:9999;box-shadow:0 0 8px rgba(30,144,255,0.6);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(6,14,23,0.8);z-index:10000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#0F2236;border:1px solid rgba(30,144,255,0.25);width:100%;max-width:400px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeIn 0.2s ease;}
.modal-box h3{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;}
.modal-box p{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.email-chip{background:rgba(30,144,255,0.08);border:1px solid rgba(30,144,255,0.2);padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:700;color:var(--blue);letter-spacing:0.03em;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:10px;font-family:'Barlow',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.04em;}
.btn-cancel:hover{border-color:white;color:white;}
.btn-send{flex:2;background:var(--blue);border:none;color:white;padding:10px;font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.06em;}
.btn-send:hover{background:#1a7de0;}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo"><img src="logo_full.png" alt="AxisFleet"/></div>
    <div class="login-card">
      <div class="login-heading">Platform Access</div>
      <div class="login-sub">Authorised personnel only — secure session required</div>
      <label class="field-label">Username</label>
      <input type="text" class="field-input" id="username" placeholder="Enter username" autocomplete="username"/>
      <label class="field-label">Password</label>
      <input type="password" class="field-input" id="password" placeholder="Enter password" autocomplete="current-password"/>
      <div class="login-error" id="login-error">Invalid credentials. Please try again.</div>
      <button class="login-btn" id="login-btn">Access Platform →</button>
      <div class="login-footer"><button class="reset-link" id="reset-link">Forgot password? Reset via admin email</button></div>
    </div>
  </div>
  <div class="login-scripture">"He will watch over your coming and going." — Psalm 121:8</div>
</div>
<div class="modal-overlay" id="reset-modal">
  <div class="modal-box">
    <h3>Reset Password</h3>
    <p>A password reset link will be sent to the registered AxisFleet administrator email address.</p>
    <div class="email-chip">axisfleetsa@gmail.com</div>
    <div class="modal-btns">
      <button class="btn-cancel" id="reset-cancel">Cancel</button>
      <button class="btn-send" id="reset-send">Send Reset Link</button>
    </div>
  </div>
</div>
<script>
document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('password').focus();});
function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const err=document.getElementById('login-error');
  if(u==='AXISFLEET'&&p==='Admin@1'){
    document.getElementById('login-btn').textContent='Authenticating...';
    document.getElementById('loading-bar').style.width='100%';
    sessionStorage.setItem('af_auth','1');
    sessionStorage.setItem('af_user','Almó Esterhuizen');
    setTimeout(()=>{window.location.href='hub.html';},1200);
  } else {
    err.style.display='block';
    ['username','password'].forEach(id=>{
      const el=document.getElementById(id);
      el.classList.add('shake');
      setTimeout(()=>el.classList.remove('shake'),400);
    });
    setTimeout(()=>err.style.display='none',3000);
  }
}
document.getElementById('reset-link').addEventListener('click',()=>document.getElementById('reset-modal').classList.add('open'));
document.getElementById('reset-cancel').addEventListener('click',()=>document.getElementById('reset-modal').classList.remove('open'));
document.getElementById('reset-send').addEventListener('click',()=>{
  document.getElementById('reset-modal').classList.remove('open');
  alert('Reset link sent to axisfleetsa@gmail.com\n\nCheck your inbox within a few minutes.');
});
</script>
</body>
</html>
